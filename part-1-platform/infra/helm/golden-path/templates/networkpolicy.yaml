{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "golden-path.fullname" . }}
  labels:
    {{- include "golden-path.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "golden-path.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic only from the AWS Load Balancer Controller / ingress pods.
    - from:
        - namespaceSelector:
            {{- toYaml .Values.networkPolicy.ingressController.namespaceSelector | nindent 12 }}
          podSelector:
            {{- toYaml .Values.networkPolicy.ingressController.podSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort | default 8080 }}
    # Allow Prometheus to scrape metrics.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort | default 8080 }}
  egress:
    # Allow DNS resolution.
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTPS egress (e.g. to AWS APIs, external services).
    - to: []
      ports:
        - protocol: TCP
          port: 443
{{- end }}
