# =============================================================================
# Golden-Path Helm Chart — Default Values
# =============================================================================
# These are the baseline values. Per-environment overrides live in
# values-{dev,staging,prod}.yaml and are merged at deploy time.
# =============================================================================

# --- Application image ---
image:
  repository: ""          # Set by CI/CD: <account>.dkr.ecr.<region>.amazonaws.com/golden-path-demo
  tag: "latest"           # Overridden by CI/CD with the Git SHA
  pullPolicy: IfNotPresent

# --- Deployment ---
replicaCount: 2

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# --- Container resources ---
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# --- Health probes ---
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# --- Service ---
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

# --- Ingress (AWS ALB) ---
ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
  hosts:
    - host: ""            # Set per environment (e.g. app.dev.example.com)
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # WAF WebACL ARN — set in values-prod.yaml to enable WAF protection.
  wafAclArn: ""

# --- Horizontal Pod Autoscaler ---
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max

# --- Service Account (IRSA) ---
serviceAccount:
  create: true
  name: ""                # Defaults to the release name
  annotations: {}
  # Set per environment:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::<account>:role/<role-name>

# --- Network Policy ---
networkPolicy:
  enabled: true
  # Allow ingress only from pods with the ingress controller label.
  ingressController:
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: kube-system
    podSelector:
      matchLabels:
        app.kubernetes.io/name: aws-load-balancer-controller

# --- External Secret (AWS Secrets Manager) ---
externalSecret:
  enabled: true
  secretStoreName: aws-secrets-manager    # ClusterSecretStore name
  refreshInterval: 1h
  remoteRef:
    key: ""               # Set per environment: golden-path/dev, golden-path/prod, etc.
  # Map of secret keys to extract from the remote secret.
  data: []
  # Example:
  # - secretKey: DATABASE_URL
  #   remoteRef:
  #     key: golden-path/dev
  #     property: database_url

# --- Prometheus ServiceMonitor ---
serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics
  labels: {}
  # Additional labels to match your Prometheus operator's serviceMonitorSelector.
  # e.g. release: kube-prometheus-stack

# --- Pod configuration ---
env: []
# - name: LOG_LEVEL
#   value: info

podAnnotations: {}

podLabels: {}

nodeSelector: {}

tolerations: []

topologySpreadConstraints: []

# --- Security context ---
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL
