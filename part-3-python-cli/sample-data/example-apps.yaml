# Example: Pre-populate the registry by placing files like these in ./registry/
---
# registry/payment-service.yaml
name: payment-service
team: payments
description: Handles payment processing and refunds
defaults:
  replicas: 2
  log_level: info
  db_host: localhost
  db_port: 5432
  cache_ttl: 300
  enable_rate_limit: true
environments:
  dev:
    log_level: debug
    enable_rate_limit: false
  staging:
    replicas: 3
    db_host: staging-db.internal
  prod:
    replicas: 5
    db_host: prod-db.internal
    log_level: warn
    cache_ttl: 600

---
# registry/notification-service.yaml
name: notification-service
team: platform
description: Email and push notification delivery
defaults:
  replicas: 1
  log_level: info
  smtp_host: localhost
  retry_count: 3
environments:
  dev:
    log_level: debug
  staging:
    replicas: 2
    smtp_host: staging-smtp.internal
  prod:
    replicas: 4
    smtp_host: prod-smtp.internal
    retry_count: 5
